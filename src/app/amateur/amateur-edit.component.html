<div class="edit-page">
  <div class="edit-card">

    <div class="edit-header-top">
      <img class="edit-logo" src="/ntc.png" alt="NTC logo">
      <div class="edit-header-text">
        <p>National Telecommunications Commission</p>
        <p>Quezon City, Metro Manila</p>
      </div>
    </div>

    <div class="edit-header-title">
      OPERATOR CERTIFICATES / STATION LICENSE FOR AMATEUR
    </div>

    <div class="tab-bar">
      <span class="tab active">General</span>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="form-grid">

        <div class="form-row full-width">
          <label>Licensee</label>
          <input type="text" [(ngModel)]="form.licensee" name="licensee" placeholder="Licensee Name">
        </div>

        <div class="form-row">
          <label>Call Sign</label>
          <input type="text" [(ngModel)]="form.callSign" name="callSign" placeholder="Call Sign">
        </div>

        <div class="form-row">
          <label>Class</label>
          <input type="text" [(ngModel)]="form.licenseClass" name="licenseClass" placeholder="License Class">
        </div>

        <div class="form-row">
          <label>Equipment 1</label>
          <input type="text" [(ngModel)]="form.equipmentOne" name="equipmentOne" placeholder="Equipment 1">
        </div>

        <div class="form-row">
          <label>Equipment 2</label>
          <input type="text" [(ngModel)]="form.equipmentTwo" name="equipmentTwo" placeholder="Equipment 2">
        </div>

        <div class="form-row full-width">
          <label>Equipment 3</label>
          <input type="text" [(ngModel)]="form.equipmentThree" name="equipmentThree" placeholder="Equipment 3">
        </div>

        <div class="form-row full-width">
          <label>Address</label>
          <input type="text" [(ngModel)]="form.address" name="address" placeholder="Address">
        </div>

        <div class="form-row full-width">
          <label>Station Location</label>
          <input type="text" [(ngModel)]="form.stationLocation" name="stationLocation" placeholder="Station Location">
        </div>

        <div class="form-row">
          <label>Valid Until</label>
          <input type="text" [(ngModel)]="form.validUntil" name="validUntil" placeholder="Valid Until">
        </div>

        <div class="form-row">
          <label>Issued On</label>
          <input type="text" [(ngModel)]="form.issuedOn" name="issuedOn" placeholder="Issue Date">
        </div>

        <div class="form-row">
          <label>Official Receipt</label>
          <input type="text" [(ngModel)]="form.officialReceipt" name="officialReceipt" placeholder="Receipt No">
        </div>

        <div class="form-row">
          <label>Amount</label>
          <input type="text" [(ngModel)]="form.amount" name="amount" placeholder="Amount">
        </div>

        <div class="form-row">
          <label>Date Paid</label>
          <input type="text" [(ngModel)]="form.datePaid" name="datePaid" placeholder="Date Paid">
        </div>

        <div class="form-row">
          <label>Cashier</label>
          <input type="text" [(ngModel)]="form.cashier" name="cashier" placeholder="Cashier">
        </div>

        <div class="form-row">
          <label>Signatory Name</label>
          <input type="text" [(ngModel)]="form.signatoryLineone" name="signatoryLineone" placeholder="Regional Director Name">
        </div>

        <div class="form-row">
          <label>Signatory Position</label>
          <input type="text" [(ngModel)]="form.signatoryLinetwo" name="signatoryLinetwo" placeholder="Position">
        </div>

        <div class="form-row">
          <label>NTC No. (1)</label>
          <input type="text" [(ngModel)]="form.ntcNumberOne" name="ntcNumberOne" placeholder="NTC No. 1">
        </div>

        <div class="form-row">
          <label>NTC No. (2)</label>
          <input type="text" [(ngModel)]="form.ntcNumberTwo" name="ntcNumberTwo" placeholder="NTC No. 2">
        </div>

        <div class="form-row full-width">
          <label>Footer Line 1</label>
          <input type="text" [(ngModel)]="form.footerLineOne" name="footerLineOne" placeholder="Footer Line 1">
        </div>

        <div class="form-row full-width">
          <label>Footer Line 2</label>
          <input type="text" [(ngModel)]="form.footerLineTwo" name="footerLineTwo" placeholder="Footer Line 2">
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit">Submit</button>
      </div>

    </form>
  </div>
</div>
