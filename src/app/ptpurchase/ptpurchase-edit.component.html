<div class="edit-page">

  <div class="edit-card">
    <div class="edit-header-top">
      <img class="edit-logo" src="/ntc.png" alt="NTC logo">
      <div class="edit-header-text">
        <p>National Telecommunications Commission</p>
        <p>Regional Office No. 5</p>
      </div>
    </div>
    <div class="edit-header-title">
      PERMIT TO PURCHASE RADIO TRANSMITTER(S) / TRANSCEIVER(S)
    </div>
    <div class="tab-bar">
      <span class="tab active">General</span>
      <div class="tab-actions">
        <button type="button" class="tab-btn-print" (click)="printPermit()">Print</button>
        <button type="button" class="tab-btn-data" (click)="printData()">Print Data</button>
      </div>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm">

      <div class="form-grid">

        <div class="form-row">
          <label>Permit No</label>
          <input type="text" [(ngModel)]="form.permitNo" name="permitNo" placeholder="PERMIT NO">
        </div>

        <div class="form-row">
          <label>Issued Date</label>
          <input type="text" [(ngModel)]="form.issuedDate" name="issuedDate" placeholder="Date Issued">
        </div>

        <div class="form-row">
          <label>Certified Name</label>
          <input type="text" [(ngModel)]="form.certifiedName" name="certifiedName" placeholder="NAME">
        </div>

        <div class="form-row">
          <label>Postal Address</label>
          <input type="text" [(ngModel)]="form.postalAddress" name="postalAddress" placeholder="ADDRESS">
        </div>

        <div class="form-row">
          <label>Model</label>
          <input type="text" [(ngModel)]="form.model" name="model" placeholder="MODEL">
        </div>

        <div class="form-row">
          <label>No of Units</label>
          <input type="text" [(ngModel)]="form.noOfUnits" name="noOfUnits" placeholder="NO OF UNITS">
        </div>

        <div class="form-row">
          <label>Frequency Range</label>
          <input type="text" [(ngModel)]="form.frequencyRange" name="frequencyRange" placeholder="FREQUENCY RANGE">
        </div>

        <div class="form-row">
          <label>Frequency Assignment</label>
          <input type="text" [(ngModel)]="form.frequencyAssignment" name="frequencyAssignment" placeholder="FREQUENCY ASSIGNMENT">
        </div>

        <div class="form-row">
          <label>RF Power Output</label>
          <input type="text" [(ngModel)]="form.rfPowerOutput" name="rfPowerOutput" placeholder="RF POWER OUTPUT">
        </div>

        <div class="form-row">
          <label>Valid Until</label>
          <input type="text" [(ngModel)]="form.validUntil" name="validUntil" placeholder="Valid Until">
        </div>

        <div class="form-row">
          <label>Official Receipt</label>
          <input type="text" [(ngModel)]="form.officialReceipt" name="officialReceipt" placeholder="Official Receipt">
        </div>

        <div class="form-row">
          <label>Amount</label>
          <input type="text" [(ngModel)]="form.amount" name="amount" placeholder="Amount">
        </div>

        <div class="form-row">
          <label>Date Paid</label>
          <input type="text" [(ngModel)]="form.datePaid" name="datePaid" placeholder="Date Paid">
        </div>

        <div class="form-row">
          <label>Encoded By</label>
          <input type="text" [(ngModel)]="form.encodedBy" name="encodedBy" placeholder="Encoded By">
        </div>

        <div class="form-row full-width">
          <label>Intended Use</label>
          <select [(ngModel)]="form.intendedUse" name="intendedUse">
            <option value="">-- Select --</option>
            <option value="For New Radio station">For New Radio station</option>
            <option value="Additional Requirement Equipment">Additional Requirement Equipment</option>
            <option value="Change of Equipment">Change of Equipment</option>
          </select>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit">Submit</button>
      </div>

    </form>
  </div>

</div>
