<div class="edit-page">

  <div class="edit-card">
    <div class="edit-header-top">
      <img class="edit-logo" src="/ntc.png" alt="NTC logo">
      <div class="edit-header-text">
        <p>National Telecommunications Commission</p>
        <p>Regional Office No. 5</p>
      </div>
    </div>
    <div class="edit-header-title">
      PERMIT TO PURCHASE RADIO TRANSMITTER(S) / TRANSCEIVER(S)
    </div>
    <div class="tab-bar">
      <span class="tab active">General</span>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="form-grid">

        <div class="form-row">
          <label>Permit No</label>
          <input type="text" [(ngModel)]="form.permitNo" name="permitNo" placeholder="PERMIT NO">
        </div>

        <div class="form-row">
          <label>Date Processed</label>
          <input type="date" [(ngModel)]="form.dateProcessed" name="dateProcessed">
        </div>

        <div class="form-row full-width">
          <label>Applicant</label>
          <input type="text" [(ngModel)]="form.applicant" name="applicant" placeholder="Applicant Name">
        </div>

        <div class="form-row full-width">
          <label>Address</label>
          <input type="text" [(ngModel)]="form.address" name="address" placeholder="Address">
        </div>

        <div class="form-row full-width">
          <label>Model</label>
          <input type="text" [(ngModel)]="form.model" name="model" placeholder="Model">
        </div>

        <div class="form-row">
          <label>No of Units</label>
          <input type="text" [(ngModel)]="form.noOfUnits" name="noOfUnits" placeholder="No of Units">
        </div>

        <div class="form-row">
          <label>Unit Count</label>
          <input type="number" [(ngModel)]="form.unitCount" name="unitCount" placeholder="Unit Count">
        </div>

        <div class="form-row">
          <label>Frequency Range</label>
          <input type="text" [(ngModel)]="form.frequencyRange" name="frequencyRange" placeholder="Frequency Range">
        </div>

        <div class="form-row">
          <label>Frequency Assignment</label>
          <input type="text" [(ngModel)]="form.frequencyAssignment" name="frequencyAssignment" placeholder="Frequency Assignment">
        </div>

        <div class="form-row">
          <label>RF Power Output</label>
          <input type="text" [(ngModel)]="form.rfPowerOutput" name="rfPowerOutput" placeholder="RF Power Output">
        </div>

        <div class="form-row">
          <label>Validity</label>
          <input type="date" [(ngModel)]="form.validity" name="validity">
        </div>

        <div class="form-row">
          <label>Extension</label>
          <input type="date" [(ngModel)]="form.extension" name="extension">
        </div>

        <div class="form-row">
          <label>Released</label>
          <input type="date" [(ngModel)]="form.released" name="released">
        </div>

        <div class="form-row">
          <label>Official Receipt</label>
          <input type="number" [(ngModel)]="form.officialReceipt" name="officialReceipt" placeholder="OR No">
        </div>

        <div class="form-row">
          <label>Amount</label>
          <input type="number" [(ngModel)]="form.amount" name="amount" placeholder="Amount">
        </div>

        <div class="form-row">
          <label>Date Paid</label>
          <input type="date" [(ngModel)]="form.date" name="date">
        </div>

        <div class="form-row">
          <label>Encoded By</label>
          <input type="text" [(ngModel)]="form.encoded" name="encoded" placeholder="Encoded By">
        </div>

        <div class="form-row full-width">
          <label>Approving Officer</label>
          <input type="text" [(ngModel)]="form.approvingOfficer" name="approvingOfficer" placeholder="Approving Officer">
        </div>

        <div class="form-row">
          <label>Position</label>
          <input type="text" [(ngModel)]="form.position" name="position" placeholder="Position">
        </div>

        <div class="form-row">
          <label>For New</label>
          <input type="text" [(ngModel)]="form.forNew" name="forNew" placeholder="For New">
        </div>

        <div class="form-row">
          <label>Additional</label>
          <input type="text" [(ngModel)]="form.additional" name="additional" placeholder="Additional">
        </div>

        <div class="form-row">
          <label>Others</label>
          <input type="text" [(ngModel)]="form.others" name="others" placeholder="Others">
        </div>

        <div class="form-row">
          <label>New Radio</label>
          <input type="text" [(ngModel)]="form.newRadio" name="newRadio" placeholder="New Radio">
        </div>

        <div class="form-row">
          <label>Additional Radio</label>
          <input type="text" [(ngModel)]="form.additionalRadio" name="additionalRadio" placeholder="Additional Radio">
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit">Submit</button>
      </div>

    </form>
  </div>

</div>
