<div class="edit-page">

  <div class="edit-card">

    <div class="edit-header-top">
      <img class="edit-logo" src="/ntc.png" alt="NTC logo">
      <div class="edit-header-text">
        <p>National Telecommunications Commission</p>
        <p>Regional Office No. 5</p>
      </div>
    </div>

    <div class="edit-header-title">
      MOBILE PHONE RETAILER'S PERMIT
    </div>

    <div class="tab-bar">
      <span class="tab active">General</span>
      <div class="tab-actions">
        <button type="button" class="tab-btn-print" (click)="printPermit()">Print</button>
      </div>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm">

      <div class="form-grid">

        <div class="form-row">
          <label>Permit No</label>
          <input type="text" [(ngModel)]="form.permitNo" name="permitNo" placeholder="Permit No">
        </div>

        <div class="form-row">
          <label>Date Issued</label>
          <input type="text" [(ngModel)]="form.dateIssued" name="dateIssued" placeholder="Date Issued">
        </div>

        <div class="form-row full-width">
          <label>Name of Applicant</label>
          <input type="text" [(ngModel)]="form.applicantName" name="applicantName" placeholder="Name of Applicant">
        </div>

        <div class="form-row full-width">
          <label>Business Address</label>
          <input type="text" [(ngModel)]="form.businessAddress" name="businessAddress" placeholder="Business Address">
        </div>

        <div class="form-row">
          <label>Telephone</label>
          <input type="text" [(ngModel)]="form.telephone" name="telephone" placeholder="Telephone">
        </div>

        <div class="form-row">
          <label>Fax No</label>
          <input type="text" [(ngModel)]="form.faxNo" name="faxNo" placeholder="Fax No">
        </div>

        <div class="form-row full-width">
          <label>SEC/DTI Registration No</label>
          <input type="text" [(ngModel)]="form.secDtiRegNo" name="secDtiRegNo" placeholder="SEC/DTI Reg No">
        </div>

        <div class="form-row">
          <label>Valid From</label>
          <input type="text" [(ngModel)]="form.validFrom" name="validFrom" placeholder="Valid From">
        </div>

        <div class="form-row">
          <label>Valid To</label>
          <input type="text" [(ngModel)]="form.validTo" name="validTo" placeholder="Valid To">
        </div>

        <div class="form-row">
          <label>OR No</label>
          <input type="text" [(ngModel)]="form.orNo" name="orNo" placeholder="OR No">
        </div>

        <div class="form-row">
          <label>Date Paid</label>
          <input type="text" [(ngModel)]="form.datePaid" name="datePaid" placeholder="Date Paid">
        </div>

        <div class="form-row">
          <label>Amount</label>
          <input type="text" [(ngModel)]="form.amount" name="amount" placeholder="Amount">
        </div>

        <div class="form-row">
          <label>Doc Stamp Tax</label>
          <input type="text" [(ngModel)]="form.docStampTax" name="docStampTax" placeholder="Doc Stamp Tax">
        </div>

        <div class="form-row">
          <label>Encoder</label>
          <input type="text" [(ngModel)]="form.encoder" name="encoder" placeholder="Encoder">
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit">Submit</button>
      </div>

    </form>
  </div>

</div>
